name: zizmor

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@v0.5.3
        with:
          config: .github/zizmor.yml
          advanced-security: "false"
          annotations: "true"
